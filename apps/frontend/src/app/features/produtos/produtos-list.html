<div class="page-container">
  <div class="header">
    <h2>Catálogo de Produtos e Receitas</h2>
    <button mat-raised-button color="primary" routerLink="/produtos/novo">
      <mat-icon>add</mat-icon>
      Novo Produto
    </button>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">
    <!-- Nome Column -->
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Nome do Produto </th>
      <td mat-cell *matCellDef="let element"> 
        <strong>{{element.nome}}</strong> 
      </td>
    </ng-container>

    <!-- Estoque Atual Column -->
    <ng-container matColumnDef="estoqueAtual">
      <th mat-header-cell *matHeaderCellDef> Estoque Atual </th>
      <td mat-cell *matCellDef="let element"> {{element.estoqueAtual}} </td>
    </ng-container>

    <!-- Unidade Column -->
    <ng-container matColumnDef="unidade">
      <th mat-header-cell *matHeaderCellDef> Unidade </th>
      <td mat-cell *matCellDef="let element"> {{element.unidade}} </td>
    </ng-container>

    <!-- Preço Venda Column -->
    <ng-container matColumnDef="precoVenda">
      <th mat-header-cell *matHeaderCellDef> Preço Venda </th>
      <td mat-cell *matCellDef="let element"> R$ {{element.precoVenda | number:'1.2-2'}} </td>
    </ng-container>

    <!-- Ações Column -->
    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" [routerLink]="['/produtos', element.id, 'editar']">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteProduto(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty-state" colspan="5" style="text-align: center; padding: 24px;">
        Nenhum produto cadastrado.
      </td>
    </tr>
  </table>
</div>
