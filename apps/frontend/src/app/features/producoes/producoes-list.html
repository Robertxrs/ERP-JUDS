<div class="page-container">
  <div class="header">
    <h2>Histórico de Produção</h2>
    <button mat-raised-button color="primary" routerLink="/producoes/nova">
      <mat-icon>precision_manufacturing</mat-icon>
      Iniciar Produção
    </button>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">
    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> # </th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>

    <!-- Produto Column -->
    <ng-container matColumnDef="produto">
      <th mat-header-cell *matHeaderCellDef> Produto </th>
      <td mat-cell *matCellDef="let element"> 
        <strong>{{element.produto?.nome}}</strong> 
      </td>
    </ng-container>

    <!-- Receita Column -->
    <ng-container matColumnDef="receita">
      <th mat-header-cell *matHeaderCellDef> Receita </th>
      <td mat-cell *matCellDef="let element"> {{element.receita?.nome}} </td>
    </ng-container>

    <!-- Quantidade Column -->
    <ng-container matColumnDef="quantidade">
      <th mat-header-cell *matHeaderCellDef> Qtd. Produzida </th>
      <td mat-cell *matCellDef="let element" class="texto-destaque"> +{{element.quantidadeProduzida}} </td>
    </ng-container>

    <!-- Custo Column -->
    <ng-container matColumnDef="custoTotal">
      <th mat-header-cell *matHeaderCellDef> Custo Total </th>
      <td mat-cell *matCellDef="let element"> R$ {{element.custoTotal | number:'1.2-2'}} </td>
    </ng-container>

    <!-- Data Column -->
    <ng-container matColumnDef="data">
      <th mat-header-cell *matHeaderCellDef> Produzido Em </th>
      <td mat-cell *matCellDef="let element"> {{element.produzidoEm | date:'short'}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  
  <div *ngIf="dataSource.length === 0" class="empty-state">
    Nenhuma produção registrada.
  </div>
</div>
