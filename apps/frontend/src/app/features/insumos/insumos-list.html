<div class="page-container">
  <div class="header">
    <h2>Controle de Insumos</h2>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon>
      Novo Insumo
    </button>
  </div>

  <div class="toolbar">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Filtrar insumos</mat-label>
      <input matInput type="text" [(ngModel)]="filterValue" (input)="applyFilter($any($event.target).value)" placeholder="Digite o nome ou unidade">
      <button mat-icon-button matSuffix *ngIf="filterValue" aria-label="Limpar filtro" (click)="applyFilter(''); filterValue = ''">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">
    <!-- Nome Column -->
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Nome do Insumo </th>
      <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
    </ng-container>

    <!-- Unidade Column -->
    <ng-container matColumnDef="unidade">
      <th mat-header-cell *matHeaderCellDef> Unidade </th>
      <td mat-cell *matCellDef="let element"> {{element.unidade}} </td>
    </ng-container>

    <!-- Estoque Atual Column -->
    <ng-container matColumnDef="estoqueAtual">
      <th mat-header-cell *matHeaderCellDef> Estoque Atual </th>
      <td mat-cell *matCellDef="let element" [class.texto-vermelho]="isBaixoEstoque(element)"> 
        <strong>{{element.estoqueAtual}}</strong> 
        <mat-icon *ngIf="isBaixoEstoque(element)" color="warn" style="font-size: 16px; width: 16px; height: 16px; margin-left: 4px; vertical-align: text-bottom;">warning</mat-icon>
      </td>
    </ng-container>

    <!-- Estoque Min Column -->
    <ng-container matColumnDef="estoqueMin">
      <th mat-header-cell *matHeaderCellDef> Estoque Mín. </th>
      <td mat-cell *matCellDef="let element"> {{element.estoqueMin}} </td>
    </ng-container>

    <!-- Ações Column -->
    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="accent" matTooltip="Registrar Entrada (Compra)" (click)="openEntradaDialog(element)">
          <mat-icon>add_shopping_cart</mat-icon>
        </button>
        <button mat-icon-button color="primary" matTooltip="Editar" (click)="openDialog(element)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" matTooltip="Excluir" (click)="deleteInsumo(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.linha-vermelha]="isBaixoEstoque(row)"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty-state" colspan="5" style="text-align: center; padding: 24px;">
        Nenhum insumo cadastrado.
      </td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>
