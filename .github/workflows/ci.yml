name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Nx artifacts
        uses: actions/cache@v4
        with:
          path: |
            .nx/cache
            ~/.npm
          key: ${{ runner.os }}-nx-${{ hashFiles('**/package-lock.json','**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: npm ci

      - name: Check formatting with Prettier
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md,css,scss,html,yml,yaml}"

      - name: Run ESLint on affected projects
        run: npx nx affected --target=lint --base=origin/main --head=HEAD --parallel=3

      - name: Run tests on affected projects
        run: npx nx affected --target=test --base=origin/main --head=HEAD --parallel=3

      - name: Build affected projects
        run: npx nx affected --target=build --base=origin/main --head=HEAD --parallel=3 --configuration=production

